openapi: 3.0.2
info:
  title: Example API
  description: This is a sample API to demonstrate OpenAPI specification.
  version: 1.0.0
  contact:
    name: API Support
    url: https://example.com/support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.example.com/v1
    description: Production server
  - url: https://staging-api.example.com/v1
    description: Staging server
  - url: http://localhost

tags:
  - name: Users
    description: User management operations
  - name: Auth
    description: Authentication and session operations
  - name: Expenses
    description: Expense management operations
  - name: Dashboard
    description: Authenticated financial dashboard
  - name: RAG
    description: Retrieval-augmented financial Q&A (legacy)
  - name: Agent
    description: Conversational AI assistant with Ollama

paths:
  /api/users:
    get:
      tags:
        - Users
      summary: Get all users
      description: Retrieve a list of all users.
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          description: Missing x-user-groups header (authorization middleware)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMiddlewareError'
        '403':
          description: Caller is not in an allowed user group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMiddlewareError'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Users
      summary: Create a new user
      description: Add a new user to the database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewUser'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '409':
          description: Resource conflict (e.g. email already registered)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/users/{id}:
    get:
      tags:
        - Users
      summary: Get a user by ID
      description: Retrieve a user by their unique ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the user
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
        - Users
      summary: Update a user
      description: Update the information of an existing user by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUser'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Users
      summary: Delete a user
      description: Delete an existing user by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the user
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: Create a user account with hashed password storage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUser'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublicProfile'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '409':
          description: Email or document already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh session tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid, expired or revoked refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: Logout and revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '204':
          description: Logout successful
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/me:
    get:
      tags:
        - Auth
      summary: Get authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublicProfile'
        '401':
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/users/me/salary:
    put:
      tags:
        - Users
      summary: Update authenticated user salary
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSalary'
      responses:
        '200':
          description: Salary updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Salary'
        '400':
          description: Invalid salary payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '401':
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'

  /api/expenses:
    post:
      tags:
        - Expenses
      summary: Create expense
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewExpense'
      responses:
        '201':
          description: Expense created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
    get:
      tags:
        - Expenses
      summary: List expenses
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [HOUSING, FOOD, TRANSPORT, HEALTH, EDUCATION, ENTERTAINMENT, SUBSCRIPTIONS, DEBT, INVESTMENT, OTHER]
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, PAID, OVERDUE, CANCELED]
        - name: referenceMonth
          in: query
          schema:
            type: string
            pattern: '^\d{4}-(0[1-9]|1[0-2])$'
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: User expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Expense'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'

  /api/expenses/{id}:
    get:
      tags:
        - Expenses
      summary: Get expense by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Expense found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '404':
          description: Expense not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
    put:
      tags:
        - Expenses
      summary: Update expense
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExpense'
      responses:
        '200':
          description: Expense updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '404':
          description: Expense not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
    delete:
      tags:
        - Expenses
      summary: Delete expense
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Expense deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '404':
          description: Expense not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'

  /api/expenses/{id}/pay:
    patch:
      tags:
        - Expenses
      summary: Mark expense as paid
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayExpense'
      responses:
        '200':
          description: Expense marked as paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '404':
          description: Expense not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'

  /api/dashboard:
    get:
      tags:
        - Dashboard
      summary: Get financial dashboard summary
      security:
        - bearerAuth: []
      parameters:
        - name: referenceMonth
          in: query
          schema:
            type: string
            pattern: '^\d{4}-(0[1-9]|1[0-2])$'
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'

  /api/rag/ask:
    post:
      tags:
        - RAG
      summary: Ask a financial question with RAG
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagQuestion'
      responses:
        '200':
          description: Financial answer generated from user context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagAnswer'
        '400':
          description: Invalid question
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'

  /api/agent/conversations:
    get:
      tags:
        - Agent
      summary: List user conversations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conversation'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
    post:
      tags:
        - Agent
      summary: Create a new empty conversation
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewConversation'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'

  /api/agent/conversations/{id}:
    get:
      tags:
        - Agent
      summary: Get conversation with messages
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conversation with message history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationWithMessages'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
    patch:
      tags:
        - Agent
      summary: Rename conversation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameConversation'
      responses:
        '200':
          description: Conversation renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '400':
          description: Invalid title
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
    delete:
      tags:
        - Agent
      summary: Delete conversation and messages
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Conversation deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'

  /api/agent/chat:
    post:
      tags:
        - Agent
      summary: Chat with the financial AI agent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentChatRequest'
      responses:
        '200':
          description: Agent reply with optional proposed actions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentChatResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '503':
          description: Ollama unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'

  /api/agent/actions/execute:
    post:
      tags:
        - Agent
      summary: Execute a confirmed agent action
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteAgentActionRequest'
      responses:
        '200':
          description: Action executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteAgentActionResponse'
        '400':
          description: Invalid action payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslatedApiError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthMiddlewareError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message from authorization middleware
          example: 'Missing x-user-groups header'
    TranslatedApiError:
      type: object
      required:
        - error
        - code
      properties:
        error:
          type: string
          description: Localized error message (from error catalog)
        code:
          type: string
          description: Stable machine-readable error code
          example: 'RESOURCE_NOT_FOUND'
        contextInfo:
          type: object
          description: Optional extra context from the service layer
          additionalProperties: true
    User:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the user
        name:
          type: string
          description: The user's name
        email:
          type: string
          description: The user's email address
        createdAt:
          type: string
          format: date-time
          description: The date and time the user was created
    NewUser:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          description: The unique identifier for the user
        name:
          type: string
          description: The user's name
        email:
          type: string
          description: The user's email address
        createdAt:
          type: string
          format: date-time
          description: The creation timestamp (optional)
    UpdateUser:
      type: object
      properties:
        name:
          type: string
          description: The user's name
        email:
          type: string
          description: The user's email address
    Error:
      type: object
      required:
        - message
        - status
      properties:
        message:
          type: string
          description: Error message describing what went wrong
          example: 'User not found'
        status:
          type: integer
          description: HTTP status code
          example: 404
        timestamp:
          type: string
          format: date-time
          description: When the error occurred
          example: '2025-07-15T17:30:00.000Z'
        path:
          type: string
          description: The API endpoint that generated the error
          example: '/users/123'
    ValidationError:
      type: object
      required:
        - message
        - status
        - errors
      properties:
        message:
          type: string
          description: General validation error message
          example: 'Validation failed'
        status:
          type: integer
          description: HTTP status code
          example: 400
        timestamp:
          type: string
          format: date-time
          description: When the error occurred
          example: '2025-07-15T17:30:00.000Z'
        path:
          type: string
          description: The API endpoint that generated the error
          example: '/users'
        errors:
          type: array
          description: List of specific validation errors
          items:
            type: object
            properties:
              field:
                type: string
                description: The field that failed validation
                example: 'email'
              message:
                type: string
                description: The validation error message
                example: 'Email is required'
              value:
                type: string
                description: The invalid value provided
                example: ''
    SuccessMessage:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Success message
          example: 'User deleted successfully'
        timestamp:
          type: string
          format: date-time
          description: When the operation was completed
          example: '2025-07-15T17:30:00.000Z'
    Document:
      type: object
      required:
        - type
        - value
      properties:
        type:
          type: string
          enum: [CPF, CNPJ]
        value:
          type: string
    RegisterUser:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        document:
          $ref: '#/components/schemas/Document'
        age:
          type: integer
          minimum: 0
          maximum: 150
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    AuthTokens:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresIn
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Access token lifetime in seconds
    UserPublicProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        document:
          $ref: '#/components/schemas/Document'
        age:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Salary:
      type: object
      properties:
        amount:
          type: number
        currency:
          type: string
          enum: [BRL]
        paymentDay:
          type: integer
          minimum: 1
          maximum: 31
        source:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UpdateSalary:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: number
          minimum: 0.01
        currency:
          type: string
          enum: [BRL]
        paymentDay:
          type: integer
          minimum: 1
          maximum: 31
        source:
          type: string
    Expense:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        description:
          type: string
        amount:
          type: number
        category:
          type: string
          enum: [HOUSING, FOOD, TRANSPORT, HEALTH, EDUCATION, ENTERTAINMENT, SUBSCRIPTIONS, DEBT, INVESTMENT, OTHER]
        paymentMethod:
          type: string
          enum: [CREDIT_CARD, DEBIT_CARD, PIX, CASH, BANK_SLIP, BANK_TRANSFER, OTHER]
        status:
          type: string
          enum: [PENDING, PAID, OVERDUE, CANCELED]
        dueDate:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
        referenceMonth:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    NewExpense:
      type: object
      required:
        - name
        - amount
        - category
        - referenceMonth
      properties:
        name:
          type: string
        description:
          type: string
        amount:
          type: number
          minimum: 0.01
        category:
          type: string
          enum: [HOUSING, FOOD, TRANSPORT, HEALTH, EDUCATION, ENTERTAINMENT, SUBSCRIPTIONS, DEBT, INVESTMENT, OTHER]
        paymentMethod:
          type: string
          enum: [CREDIT_CARD, DEBIT_CARD, PIX, CASH, BANK_SLIP, BANK_TRANSFER, OTHER]
        status:
          type: string
          enum: [PENDING, PAID, OVERDUE, CANCELED]
        dueDate:
          type: string
          format: date-time
        referenceMonth:
          type: string
          pattern: '^\d{4}-(0[1-9]|1[0-2])$'
    UpdateExpense:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        amount:
          type: number
          minimum: 0.01
        category:
          type: string
          enum: [HOUSING, FOOD, TRANSPORT, HEALTH, EDUCATION, ENTERTAINMENT, SUBSCRIPTIONS, DEBT, INVESTMENT, OTHER]
        paymentMethod:
          type: string
          enum: [CREDIT_CARD, DEBIT_CARD, PIX, CASH, BANK_SLIP, BANK_TRANSFER, OTHER]
        status:
          type: string
          enum: [PENDING, PAID, OVERDUE, CANCELED]
        dueDate:
          type: string
          format: date-time
        referenceMonth:
          type: string
          pattern: '^\d{4}-(0[1-9]|1[0-2])$'
    PayExpense:
      type: object
      properties:
        paidAt:
          type: string
          format: date-time
        paymentMethod:
          type: string
          enum: [CREDIT_CARD, DEBIT_CARD, PIX, CASH, BANK_SLIP, BANK_TRANSFER, OTHER]
    DashboardByCategory:
      type: object
      properties:
        category:
          type: string
          enum: [HOUSING, FOOD, TRANSPORT, HEALTH, EDUCATION, ENTERTAINMENT, SUBSCRIPTIONS, DEBT, INVESTMENT, OTHER]
        total:
          type: number
        paid:
          type: number
        pending:
          type: number
        overdue:
          type: number
    DashboardTopExpense:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [PENDING, PAID, OVERDUE, CANCELED]
        category:
          type: string
          enum: [HOUSING, FOOD, TRANSPORT, HEALTH, EDUCATION, ENTERTAINMENT, SUBSCRIPTIONS, DEBT, INVESTMENT, OTHER]
        dueDate:
          type: string
          format: date-time
        referenceMonth:
          type: string
    DashboardSummary:
      type: object
      properties:
        salary:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
          enum:
            - BRL
            - null
        totalExpenses:
          type: number
        totalPaid:
          type: number
        totalPending:
          type: number
        totalOverdue:
          type: number
        availableBalance:
          type: number
          nullable: true
        incomeCommitmentPercent:
          type: number
          nullable: true
        byCategory:
          type: array
          items:
            $ref: '#/components/schemas/DashboardByCategory'
        topExpenses:
          type: array
          items:
            $ref: '#/components/schemas/DashboardTopExpense'
    RagQuestion:
      type: object
      required:
        - question
      properties:
        question:
          type: string
          minLength: 1
    RagSource:
      type: object
      properties:
        sourceType:
          type: string
          enum: [EXPENSE, SALARY, DASHBOARD_SNAPSHOT, OTHER]
        sourceId:
          type: string
        excerpt:
          type: string
        score:
          type: number
    RagAnswer:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: '#/components/schemas/RagSource'
    AgentMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
    AgentChatRequest:
      type: object
      required:
        - message
      properties:
        conversationId:
          type: string
          description: Existing conversation id; omit to start a new chat
        message:
          type: string
          description: User message for this turn
    Conversation:
      type: object
      required:
        - id
        - userId
        - title
        - createdAt
        - updatedAt
        - lastMessageAt
      properties:
        id:
          type: string
        userId:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastMessageAt:
          type: string
          format: date-time
    NewConversation:
      type: object
      properties:
        title:
          type: string
    RenameConversation:
      type: object
      required:
        - title
      properties:
        title:
          type: string
    ChatMessage:
      type: object
      required:
        - id
        - conversationId
        - userId
        - role
        - content
        - createdAt
      properties:
        id:
          type: string
        conversationId:
          type: string
        userId:
          type: string
        role:
          type: string
          enum: [USER, ASSISTANT]
        content:
          type: string
        proposedActions:
          type: array
          items:
            $ref: '#/components/schemas/ProposedAction'
        createdAt:
          type: string
          format: date-time
    ConversationWithMessages:
      allOf:
        - $ref: '#/components/schemas/Conversation'
        - type: object
          required:
            - messages
          properties:
            messages:
              type: array
              items:
                $ref: '#/components/schemas/ChatMessage'
    ProposedAction:
      type: object
      required:
        - id
        - type
        - summary
        - payload
      properties:
        id:
          type: string
        type:
          type: string
          enum: [CREATE_EXPENSE, UPDATE_SALARY]
        summary:
          type: string
        payload:
          type: object
          additionalProperties: true
    AgentChatResponse:
      type: object
      required:
        - conversationId
        - message
      properties:
        conversationId:
          type: string
        message:
          $ref: '#/components/schemas/AgentMessage'
        proposedActions:
          type: array
          items:
            $ref: '#/components/schemas/ProposedAction'
    ExecuteAgentActionRequest:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          enum: [CREATE_EXPENSE, UPDATE_SALARY]
        payload:
          type: object
          additionalProperties: true
    ExecuteAgentActionResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          additionalProperties: true
